{% extends "base.html" %}

{% block title %}Открыть вклад{% endblock %}

{% block content %}
<div class="card">
    <h2>Открытие нового вклада</h2>
    <form method="post">
        <div>
            <label for="depositor_id">Вкладчик</label>
            <select id="depositor_id" name="depositor_id" required>
                <option value="">Выберите вкладчика</option>
                {% for depositor in depositors %}
                    <option value="{{ depositor.id }}">
                        {{ depositor.last_name }} {{ depositor.first_name }} {{ depositor.middle_name or "" }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="deposit_type">Тип вклада</label>
            <input type="text" id="deposit_type" name="deposit_type" required>
        </div>

        <div>
            <label for="amount">Сумма</label>
            <input type="number" id="amount" step="0.01" name="amount" required>
        </div>

        <div>
            <label for="interest_rate">Процентная ставка</label>
            <input type="number" id="interest_rate" step="0.01" name="interest_rate" required>
        </div>

        <div>
            <label for="start_date">Дата начала</label>
            <input type="date" id="start_date" name="start_date" required>
        </div>

        <div>
            <label for="end_date">Дата окончания</label>
            <input type="date" id="end_date" name="end_date" required>
        </div>

        <div>
            <label for="term_months">Срок в месяцах</label>
            <input type="number" id="term_months" name="term_months" required>
        </div>

        <div>
            <label for="currency">Валюта</label>
            <select id="currency" name="currency">
                <option value="RUB">RUB</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
            </select>
        </div>

        <div class="checkbox-row">
            <input type="checkbox" name="capitalization" id="capitalization">
            <label for="capitalization">Капитализация</label>
        </div>

        <div class="checkbox-row">
            <input type="checkbox" name="auto_renewal" id="auto_renewal">
            <label for="auto_renewal">Автопролонгация</label>
        </div>

        <div class="actions">
            <button type="submit">Открыть вклад</button>
            <a class="btn btn-secondary" href="{{ url_for('deposits') }}">Назад</a>
        </div>
    </form>
</div>
{% endblock %}
