{% extends "base.html" %}

{% block title %}Добавить вкладчика{% endblock %}

{% block content %}
<div class="card">
    <h2>Новый вкладчик</h2>
    <form method="post">
        <div>
            <label for="last_name">Фамилия</label>
            <input type="text" id="last_name" name="last_name" required>
        </div>

        <div>
            <label for="first_name">Имя</label>
            <input type="text" id="first_name" name="first_name" required>
        </div>

        <div>
            <label for="middle_name">Отчество</label>
            <input type="text" id="middle_name" name="middle_name">
        </div>

        <div>
            <label for="passport_series">Серия паспорта</label>
            <input type="text" id="passport_series" name="passport_series" required>
        </div>

        <div>
            <label for="passport_number">Номер паспорта</label>
            <input type="text" id="passport_number" name="passport_number" required>
        </div>

        <div>
            <label for="issued_by">Кем выдан</label>
            <input type="text" id="issued_by" name="issued_by">
        </div>

        <div>
            <label for="address">Адрес</label>
            <input type="text" id="address" name="address">
        </div>

        <div>
            <label for="phone">Телефон</label>
            <input type="text" id="phone" name="phone">
        </div>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
        </div>

        <div class="actions">
            <button type="submit">Сохранить</button>
            <a class="btn btn-secondary" href="{{ url_for('depositors') }}">Назад</a>
        </div>
    </form>
</div>
{% endblock %}
