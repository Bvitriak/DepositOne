{% extends "base.html" %}
{% block title %}Редактирование вклада{% endblock %}
{% block content %}
<div class="card">
    <h2>Редактирование вклада #{{ deposit.id }}</h2>
    <form method="post">
        <div>
            <label for="depositor_id">Вкладчик</label>
            <select id="depositor_id" name="depositor_id" required>
                {% for depositor in depositors %}
                <option value="{{ depositor.id }}" {% if depositor.id== deposit.depositor_id %}selected{% endif %}>
                    {{ depositor.last_name }} {{ depositor.first_name }} {{ depositor.middle_name or '' }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="deposit_type">Тип вклада</label>
            <input type="text" id="deposit_type" name="deposit_type" value="{{ deposit.deposit_type }}" required>
        </div>
        <div>
            <label for="amount">Сумма</label>
            <input type="number" step="0.01" min="0" id="amount" name="amount" value="{{ deposit.amount }}" required>
        </div>
        <div>
            <label for="interest_rate">Процентная ставка</label>
            <input type="number" step="0.01" min="0" id="interest_rate" name="interest_rate" value="{{ deposit.interest_rate }}" required>
        </div>
        <div>
            <label for="currency">Валюта</label>
            <select id="currency" name="currency" required>
                {% for item in currency_options %}
                <option value="{{ item }}" {% if item== deposit.currency %}selected{% endif %}>{{ item }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="start_date">Дата начала</label>
            <input type="date" id="start_date" name="start_date" value="{{ deposit.start_date }}" required>
        </div>
        <div>
            <label for="end_date">Дата окончания</label>
            <input type="date" id="end_date" name="end_date" value="{{ deposit.end_date }}" required>
        </div>
        <div>
            <label for="status">Статус</label>
            <select id="status" name="status" required>
                {% for item in status_options %}
                <option value="{{ item }}" {% if item== deposit.status %}selected{% endif %}>{{ item }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label>
                <input type="checkbox" name="capitalization" {% if deposit.capitalization %}checked{% endif %}>
                Капитализация
            </label>
        </div>
        <div>
            <label>
                <input type="checkbox" name="auto_renewal" {% if deposit.auto_renewal %}checked{% endif %}>
                Автопролонгация
            </label>
        </div>
        <div class="actions">
            <button type="submit">Сохранить</button>
            <a class="btn btn-secondary" href="{{ url_for('deposits') }}">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
